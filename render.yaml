services:
  - type: web
    name: webspidey-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180
    envVars:
      - key: FRONTEND_URL
        value: http://localhost:3000
      - key: SECRET_KEY
        generateValue: true
